name: Compile ESP32 Firmware

on:
  push:
    branches:
      - main  # Triggers the compilation every time you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Platform Core
      run: |
        arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

    - name: Install Libraries
      run: |
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SH110X"
        arduino-cli lib install "ArduinoJson"

    - name: Compile Sketch
      env:
        WIFI_SSID: ${{ secrets.WIFI_SSID }}
        WIFI_PASS: ${{ secrets.WIFI_PASS }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_HOST: ${{ secrets.GEMINI_HOST }}
      run: |
        # 1. Create a matching folder directory for the sketch
        mkdir -p main
        cp main.ino main/main.ino
        
        # 2. Dynamically generate a secrets.h file safely using EOF
        cat << 'EOF' > main/secrets.h
        #ifndef SECRETS_H
        #define SECRETS_H
        
        #define WIFI_SSID "$WIFI_SSID"
        #define WIFI_PASS "$WIFI_PASS"
        #define GEMINI_HOST "$GEMINI_HOST"
        #define GEMINI_API_KEY "$GEMINI_API_KEY"
        
        #endif
        EOF
        
        # 3. Substitute the actual env variables into the file securely
        envsubst < main/secrets.h > main/secrets_temp.h && mv main/secrets_temp.h main/secrets.h

        # 4. Compile cleanly without messy build properties
        arduino-cli compile --fqbn esp32:esp32:esp32 main --output-dir ./build

    - name: Upload Compiled Firmware
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware
        path: ./build/main.ino.bin

name: Build and Deploy Firmware

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Generate real secrets.h from GitHub Secrets ─────────────
      - name: Generate secrets.h
        run: |
          cat > secrets.h << 'EOF'
          #ifndef SECRETS_H
          #define SECRETS_H
          static const char* WIFI_SSID      = "${{ secrets.WIFI_SSID }}";
          static const char* WIFI_PASS      = "${{ secrets.WIFI_PASS }}";
          static const char* GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}";
          static const char* GEMINI_MODEL   = "${{ secrets.GEMINI_HOST }}";
          #endif
          EOF

      # ── 3. Setup Arduino CLI ───────────────────────────────────────
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      # ── 4. Install ESP32 board ─────────────────────────────────────
      - name: Install ESP32 board
        run: |
          arduino-cli core update-index \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      # ── 5. Install libraries ───────────────────────────────────────
      - name: Install libraries
        run: |
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit SH110X"
          arduino-cli lib install "ArduinoJson"

      # ── 6. Compile ─────────────────────────────────────────────────
      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            main.ino

      # ── 7. Push firmware.bin to repo for OTA ──────────────────────
      - name: Push firmware.bin
        run: |
          cp ./build/main.ino.bin ./firmware.bin
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware.bin
          git diff --staged --quiet || git commit -m "OTA: update firmware [skip ci]"
          git push

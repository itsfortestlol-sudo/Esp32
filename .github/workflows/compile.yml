name: Compile ESP32 Firmware

on:
  push:
    branches:
      - main  # Triggers compilation every time you push changes to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Platform Core
      run: |
        arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

    - name: Install Libraries
      run: |
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SH110X"

    - name: Compile and Generate Firmware
      run: |
        # Automatically creates the sketch folder required by Arduino
        mkdir -p main
        cp main.ino main/main.ino
        
        # Directly tells the compiler to output a single file named 'firmware.bin'
        arduino-cli compile --fqbn esp32:esp32:esp32 main --output-dest ./firmware.bin

    - name: Commit and Push to Repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add firmware.bin
        git commit -m "Automated firmware compilation" || exit 0
        git push

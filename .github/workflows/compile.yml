name: Compile ESP32 Firmware

on:
  push:
    branches:
      - main  # Triggers the compilation every time you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Platform Core
      run: |
        arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

    - name: Install Libraries
      run: |
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SH110X"
        arduino-cli lib install "ArduinoJson"

    - name: Compile Sketch
      env:
        WIFI_SSID: ${{ secrets.WIFI_SSID }}
        WIFI_PASS: ${{ secrets.WIFI_PASS }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_HOST: ${{ secrets.GEMINI_HOST }}
      run: |
        # Creates a matching folder directory so the Arduino CLI can parse the sketch successfully
        mkdir -p main
        cp main.ino main/main.ino
        
        # Compile while passing the variables as build flags
        arduino-cli compile --fqbn esp32:esp32:esp32 main --output-dir ./build \
          --build-property "compiler.cpp.extra_flags=-DWIFI_SSID=\"$WIFI_SSID\" -DWIFI_PASS=\"$WIFI_PASS\" -DGEMINI_HOST=\"$GEMINI_HOST\" -DGEMINI_API_KEY=\"$GEMINI_API_KEY\""

    - name: Commit and Push Compiled Binary
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Explicitly copies the exact application binary file using the known output naming convention
        cp build/main.ino.bin firmware.bin
        git add firmware.bin
        git commit -m "Automated firmware compilation" || exit 0
        git push

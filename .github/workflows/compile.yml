name: Compile ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Arduino CLI
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    # 3. Install ESP32 Platform Core
    - name: Install ESP32 Platform
      run: |
        arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

    # 4. Install required libraries
    - name: Install Libraries
      run: |
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SH110X"
        arduino-cli lib install "ArduinoJson"

    # 5. Compile the sketch directly from the root directory
    - name: Compile Sketch
      run: |
        arduino-cli compile --fqbn esp32:esp32:esp32 --output-dir ./build .

    # 6. Upload as GitHub Artifact (Optional backup download)
    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-bin
        path: ./build/*.bin

    # 7. Automatically commit and push firmware.bin back to the repository root
    - name: Commit and Push Firmware to Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        cp ./build/*.bin ./firmware.bin
        git add firmware.bin
        git commit -m "Automated build: Update firmware.bin [skip ci]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab everything from your main branch
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Arduino CLI
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    # 3. Install ESP32 Platform Core
    - name: Install ESP32 Platform
      run: |
        arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

    # 4. Install required libraries
    - name: Install Libraries
      run: |
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SH110X"
        arduino-cli lib install "ArduinoJson"

    # 5. Compile main.ino directly using --sketch-path
    - name: Compile Sketch
      run: |
        mkdir -p build_output
        arduino-cli compile --fqbn esp32:esp32:esp32 --build-path ./build_output --sketch-path .
        cp ./build_output/main.ino.bin ./firmware.bin    # 6. Push firmware.bin straight back to your main branch
    - name: Commit and Push firmware.bin
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add firmware.bin
        git commit -m "Automated build: Update firmware.bin [skip ci]" || echo "No changes to commit"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
